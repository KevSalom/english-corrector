<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 13 87 87" width="100%" height="100%">
  <defs>
    <mask id="arrow-cutout">
      <!-- Background white: makes everything visible -->
      <rect x="0" y="0" width="100" height="100" fill="white" />
      
      <!-- Black stroke: cuts out a channel where the arrow passes -->
      <g transform="rotate(-45 38 62)">
        <!-- Reduced stroke-width from 12 to 9.5 to make the gap around the arrow slightly tighter -->
        <line x1="48" y1="62" x2="82" y2="62" stroke="black" stroke-width="9.5" stroke-linecap="round" />
      </g>
    </mask>
  </defs>

  <!-- Target Rings with mask applied -->
  <g mask="url(#arrow-cutout)">
    <circle cx="38" cy="62" r="35" stroke="#e59c77" stroke-width="4.5" fill="none" />
    <circle cx="38" cy="62" r="24" stroke="#e59c77" stroke-width="4.5" fill="none" />
    <circle cx="38" cy="62" r="13" stroke="#e59c77" stroke-width="4.5" fill="none" />
  </g>

  <!-- Center Dot (drawn outside the mask so it remains solid) -->
  <circle cx="38" cy="62" r="5" fill="#ca6a43" />

  <!-- Arrow rotated -45 degrees (drawn outside the mask so it is fully visible) -->
  <g transform="rotate(-45 38 62)">
    <!-- Shaft -->
    <line x1="47" y1="62" x2="88" y2="62" stroke="#e59c77" stroke-width="4.5" stroke-linecap="round" />
    <!-- Arrowhead -->
    <path d="M 52 56 L 41 62 L 52 68 L 49 62 Z" fill="#e59c77" />
    <!-- Fletching (Feathers) -->
    <path d="M 75 62 L 83 51 L 89 51 L 81 62 Z" fill="#e59c77" />
    <path d="M 75 62 L 83 73 L 89 73 L 81 62 Z" fill="#e59c77" />
    <path d="M 81 62 L 89 51 L 95 51 L 87 62 Z" fill="#e59c77" />
    <path d="M 81 62 L 89 73 L 95 73 L 87 62 Z" fill="#e59c77" />
  </g>
</svg>
